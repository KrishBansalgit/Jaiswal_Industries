<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#222228"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="50%" stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#c8860a"/>
    </linearGradient>
    <linearGradient id="borderGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="50%" stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#c8860a"/>
    </linearGradient>
    <linearGradient id="lightBeamL" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#fffbe0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fffbe0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lightBeamR" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#fffbe0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fffbe0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="studCenter" cx="50%" cy="38%" r="52%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#ffe566"/>
      <stop offset="75%" stop-color="#d4900a"/>
      <stop offset="100%" stop-color="#7a4f00"/>
    </radialGradient>
    <radialGradient id="studRed" cx="50%" cy="38%" r="52%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ff8888"/>
      <stop offset="70%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <clipPath id="logoBound">
      <rect x="30" y="20" width="620" height="420"/>
    </clipPath>
  </defs>

  <rect x="30" y="20" width="620" height="420" fill="url(#skyGrad)"/>
  <polygon points="30,460 650,460 620,230 40,230" fill="url(#roadGrad)" clip-path="url(#logoBound)"/>
  <line x1="40" y1="230" x2="30" y2="460" stroke="#cccccc" stroke-width="2" opacity="0.5"/>
  <line x1="620" y1="230" x2="650" y2="460" stroke="#cccccc" stroke-width="2" opacity="0.5"/>
  <line x1="340" y1="235" x2="338" y2="275" stroke="#f5c518" stroke-width="2.5" stroke-dasharray="14 10"/>
  <line x1="337" y1="290" x2="334" y2="340" stroke="#f5c518" stroke-width="2.5" stroke-dasharray="14 10"/>
  <line x1="333" y1="358" x2="330" y2="420" stroke="#f5c518" stroke-width="2.5" stroke-dasharray="14 10"/>
  <line x1="329" y1="435" x2="327" y2="460" stroke="#f5c518" stroke-width="2.5" stroke-dasharray="14 10"/>
  <polygon points="280,232 180,440 260,440" fill="url(#lightBeamL)" opacity="0.7"/>
  <polygon points="400,232 420,440 500,440" fill="url(#lightBeamR)" opacity="0.7"/>

  <!-- Reflective studs -->
  <ellipse cx="310" cy="243" rx="5" ry="3" fill="url(#studCenter)" opacity="0.95"/>
  <ellipse cx="370" cy="243" rx="5" ry="3" fill="url(#studCenter)" opacity="0.95"/>
  <ellipse cx="250" cy="248" rx="5" ry="3" fill="url(#studRed)" opacity="0.9"/>
  <ellipse cx="430" cy="248" rx="5" ry="3" fill="url(#studRed)" opacity="0.9"/>
  <ellipse cx="305" cy="260" rx="6" ry="3.5" fill="url(#studCenter)" opacity="0.95"/>
  <ellipse cx="375" cy="260" rx="6" ry="3.5" fill="url(#studCenter)" opacity="0.95"/>
  <ellipse cx="220" cy="267" rx="6" ry="3.5" fill="url(#studRed)" opacity="0.9"/>
  <ellipse cx="460" cy="267" rx="6" ry="3.5" fill="url(#studRed)" opacity="0.9"/>
  <ellipse cx="298" cy="282" rx="7" ry="4" fill="url(#studCenter)" opacity="0.97"/>
  <ellipse cx="382" cy="282" rx="7" ry="4" fill="url(#studCenter)" opacity="0.97"/>
  <ellipse cx="185" cy="292" rx="7" ry="4" fill="url(#studRed)" opacity="0.9"/>
  <ellipse cx="495" cy="292" rx="7" ry="4" fill="url(#studRed)" opacity="0.9"/>
  <ellipse cx="290" cy="310" rx="9" ry="5" fill="url(#studCenter)" opacity="1"/>
  <ellipse cx="390" cy="310" rx="9" ry="5" fill="url(#studCenter)" opacity="1"/>
  <ellipse cx="148" cy="323" rx="8" ry="5" fill="url(#studRed)" opacity="0.9"/>
  <ellipse cx="532" cy="323" rx="8" ry="5" fill="url(#studRed)" opacity="0.9"/>
  <ellipse cx="280" cy="345" rx="11" ry="6" fill="url(#studCenter)" opacity="1"/>
  <ellipse cx="400" cy="345" rx="11" ry="6" fill="url(#studCenter)" opacity="1"/>
  <ellipse cx="108" cy="362" rx="10" ry="6" fill="url(#studRed)" opacity="0.88"/>
  <ellipse cx="572" cy="362" rx="10" ry="6" fill="url(#studRed)" opacity="0.88"/>
  <ellipse cx="268" cy="390" rx="13" ry="7" fill="url(#studCenter)" opacity="1"/>
  <ellipse cx="412" cy="390" rx="13" ry="7" fill="url(#studCenter)" opacity="1"/>
  <ellipse cx="68" cy="408" rx="12" ry="7" fill="url(#studRed)" opacity="0.85"/>
  <ellipse cx="612" cy="408" rx="12" ry="7" fill="url(#studRed)" opacity="0.85"/>
  <ellipse cx="255" cy="435" rx="15" ry="8" fill="url(#studCenter)" opacity="1"/>
  <ellipse cx="425" cy="435" rx="15" ry="8" fill="url(#studCenter)" opacity="1"/>

  <!-- Stud shine -->
  <circle cx="310" cy="241" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="370" cy="241" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="298" cy="279" r="2" fill="white" opacity="0.9"/>
  <circle cx="382" cy="279" r="2" fill="white" opacity="0.9"/>
  <circle cx="280" cy="341" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="400" cy="341" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="265" cy="386" r="3" fill="white" opacity="0.9"/>
  <circle cx="415" cy="386" r="3" fill="white" opacity="0.9"/>
  <circle cx="252" cy="430" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="428" cy="430" r="3.5" fill="white" opacity="0.9"/>

  <!-- Gold border -->
  <rect x="30" y="20" width="620" height="420" rx="0" fill="none" stroke="url(#borderGold)" stroke-width="5"/>
  <rect x="44" y="34" width="592" height="392" rx="0" fill="none" stroke="#c8952a" stroke-width="1.5"/>

  <!-- Brick pattern -->
  <g fill="#c8952a" fill-opacity="0.18" stroke="#c8952a" stroke-width="2">
    <rect x="30" y="20" width="70" height="18"/>
    <rect x="100" y="20" width="70" height="18"/>
    <rect x="170" y="20" width="70" height="18"/>
    <rect x="240" y="20" width="70" height="18"/>
    <rect x="310" y="20" width="70" height="18"/>
    <rect x="380" y="20" width="70" height="18"/>
    <rect x="450" y="20" width="70" height="18"/>
    <rect x="520" y="20" width="70" height="18"/>
    <rect x="590" y="20" width="60" height="18"/>
    <rect x="30" y="422" width="70" height="18"/>
    <rect x="100" y="422" width="70" height="18"/>
    <rect x="170" y="422" width="70" height="18"/>
    <rect x="240" y="422" width="70" height="18"/>
    <rect x="310" y="422" width="70" height="18"/>
    <rect x="380" y="422" width="70" height="18"/>
    <rect x="450" y="422" width="70" height="18"/>
    <rect x="520" y="422" width="70" height="18"/>
    <rect x="590" y="422" width="60" height="18"/>
    <rect x="30" y="38" width="18" height="50"/>
    <rect x="30" y="88" width="18" height="50"/>
    <rect x="30" y="138" width="18" height="50"/>
    <rect x="30" y="188" width="18" height="50"/>
    <rect x="30" y="238" width="18" height="50"/>
    <rect x="30" y="288" width="18" height="50"/>
    <rect x="30" y="338" width="18" height="50"/>
    <rect x="30" y="388" width="18" height="34"/>
    <rect x="632" y="38" width="18" height="50"/>
    <rect x="632" y="88" width="18" height="50"/>
    <rect x="632" y="138" width="18" height="50"/>
    <rect x="632" y="188" width="18" height="50"/>
    <rect x="632" y="238" width="18" height="50"/>
    <rect x="632" y="288" width="18" height="50"/>
    <rect x="632" y="338" width="18" height="50"/>
    <rect x="632" y="388" width="18" height="34"/>
  </g>

  <!-- JAISWAL -->
  <text x="340" y="148" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96" font-weight="700" letter-spacing="3"
    fill="url(#goldText)" stroke="#7a4f00" stroke-width="1">JAISWAL</text>

  <line x1="90" y1="162" x2="590" y2="162" stroke="url(#borderGold)" stroke-width="1.5"/>

  <!-- INDUSTRIES -->
  <text x="340" y="210" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="42" font-weight="700" letter-spacing="8"
    fill="url(#goldText)" stroke="#7a4f00" stroke-width="0.5">INDUSTRIES</text>

  <text x="614" y="60" font-size="15" font-family="Arial, sans-serif" fill="#f5c518">&#8482;</text>

  <circle cx="190" cy="450" r="6" fill="url(#studCenter)"/>
  <text x="200" y="454" font-family="Arial, sans-serif" font-size="11" fill="#f5c518">Yellow - forward facing</text>
  <circle cx="400" cy="450" r="6" fill="url(#studRed)"/>
  <text x="410" y="454" font-family="Arial, sans-serif" font-size="11" fill="#f5c518">Red - rear facing</text>
</svg>
